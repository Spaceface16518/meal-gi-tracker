<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f7f8f3" />
    <title>Meal Signal Offline</title>
    <style>
      :root {
        color: #1c1917;
        background: #f7f8f3;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        display: grid;
        min-height: 100vh;
        margin: 0;
        place-items: center;
      }

      main {
        width: min(28rem, calc(100vw - 2rem));
        border: 1px solid #e7e5e4;
        border-radius: 0.5rem;
        background: #ffffff;
        padding: 1.25rem;
        box-shadow: 0 1px 2px rgb(0 0 0 / 0.06);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.125rem;
      }

      p {
        margin: 0;
        color: #57534e;
        font-size: 0.875rem;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Meal Signal is offline</h1>
      <p>
        Reconnect to load your private meal and symptom data. Saved records are
        not cached on this device by the offline page.
      </p>
    </main>
  </body>
</html>
