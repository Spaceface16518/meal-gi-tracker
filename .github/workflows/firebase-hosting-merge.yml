name: Firebase Hosting Live

on:
  workflow_run:
    workflows:
      - Node
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  deploy_live:
    if: >-
      ${{
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify Node build jobs succeeded
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          conclusions="$(
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/jobs" --paginate \
              --jq '.jobs[] | select(.name | startswith("Build (")) | .conclusion'
          )"

          if [ -z "$conclusions" ]; then
            echo "No Node build jobs were found for workflow run ${RUN_ID}."
            exit 1
          fi

          for conclusion in $conclusions; do
            if [ "$conclusion" != "success" ]; then
              echo "A Node build job finished with conclusion: ${conclusion}"
              exit 1
            fi
          done

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: ./.github/actions/setup-npm-project
        with:
          working-directory: apps/web
      - name: Build Firebase Hosting artifact
        run: npm run build
        working-directory: apps/web
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MEAL_TRACKER_46346 }}
          channelId: live
          projectId: meal-tracker-46346
